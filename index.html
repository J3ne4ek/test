<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data visualization</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #50c878;
            --danger-color: #e74c3c;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --border-color: #e1e8ed;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
            --shadow-hover: 0 4px 16px rgba(0,0,0,0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            color: var(--primary-color);
            font-size: 28px;
            font-weight: 600;
        }

        .navigation {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: var(--primary-color);
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .item-counter {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-color);
        }

        .main-content {
            display: grid;
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: var(--shadow);
            padding: 20px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border-color);
        }

        .card-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--primary-color);
        }

        .collapse-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-color);
            transition: all 0.3s;
        }

        .collapse-btn:hover {
            background: var(--bg-color);
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .collapsible-content {
            max-height: 600px;
            overflow-y: auto;
            transition: max-height 0.3s ease;
        }

        .collapsible-content.collapsed {
            max-height: 0;
            overflow: hidden;
        }
        /* Single scroll: only the collapsible scrolls, inner content does not */
        .collapsible-content .diff-content {
            max-height: none;
            overflow: visible;
        }
        .collapsible-content .edit-content.expanded {
            max-height: none;
            overflow: visible;
        }

        .edit-item {
            background: var(--bg-color);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 12px;
            overflow: hidden;
            transition: all 0.3s;
        }

        .edit-item:hover {
            border-color: var(--primary-color);
            box-shadow: 0 2px 8px rgba(74, 144, 226, 0.2);
        }

        .edit-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            user-select: none;
        }

        .edit-header:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        .edit-title {
            color: white;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .edit-number {
            background: rgba(255, 255, 255, 0.3);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
        }

        .edit-toggle {
            color: white;
            font-size: 18px;
            transition: transform 0.3s;
        }

        .edit-toggle.expanded {
            transform: rotate(180deg);
        }

        .edit-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .edit-content.expanded {
            max-height: 800px;
            overflow-y: auto;
        }

        .edit-body {
            padding: 16px;
        }

        .edit-file {
            display: inline-block;
            background: var(--primary-color);
            color: white;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .diff-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        .diff-container.three-panels {
            grid-template-columns: 1fr 1fr 1fr;
        }

        .diff-panel {
            border: 2px solid var(--border-color);
            border-radius: 10px;
            overflow: hidden;
            background: #1e1e1e;
        }

        .diff-header {
            background: var(--primary-color);
            color: white;
            padding: 12px 16px;
            font-weight: 600;
            font-size: 16px;
        }

        .diff-content {
            max-height: none;
            overflow: visible;
            background: #1e1e1e;
        }

        .sample-block {
            margin-bottom: 2em;
            scroll-margin-top: 1em;
        }

        .sample-caption {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 1em;
            padding-bottom: 0.5em;
            border-bottom: 2px solid var(--border-color);
        }

        .code-block {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .code-block pre {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: visible;
        }

        .code-block code {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
        }

        .metadata-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            padding: 15px;
            background: var(--bg-color);
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .metadata-info:last-child {
            margin-bottom: 0;
        }
        .metrics-section-label {
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 8px;
            margin-bottom: 6px;
        }
        /* Metrics & Statistics: table layout, one row per metric/stat */
        .metrics-stat-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .metrics-stat-table th,
        .metrics-stat-table td {
            padding: 10px 14px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        .metrics-stat-table th {
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            width: 55%;
        }
        .metrics-stat-table td {
            color: var(--text-color);
            font-weight: 500;
        }
        .metrics-stat-table tr:last-child td {
            border-bottom: none;
        }
        .metrics-stat-table-wrapper {
            margin-bottom: 16px;
            background: var(--bg-color);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        .metrics-stat-table-wrapper:last-child {
            margin-bottom: 0;
        }
        #metricsInfo .metrics-stat-table-wrapper,
        #statisticsInfo .metrics-stat-table-wrapper {
            margin-bottom: 16px;
        }
        #metricsInfo .metrics-stat-table-wrapper:last-child,
        #statisticsInfo .metrics-stat-table-wrapper:last-child {
            margin-bottom: 0;
        }

        .metadata-item {
            display: flex;
            flex-direction: column;
        }

        .metadata-label {
            font-size: 12px;
            color: #7f8c8d;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .metadata-value {
            font-size: 14px;
            color: var(--text-color);
            font-weight: 500;
        }

        .score-display {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 18px;
            flex-wrap: wrap;
            background: var(--bg-color);
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        .score-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
        }

        .score-chip.primary {
            background: linear-gradient(135deg, rgba(74, 144, 226, 0.12) 0%, rgba(74, 144, 226, 0.06) 100%);
            border-color: rgba(74, 144, 226, 0.35);
            color: var(--primary-color);
            font-weight: 600;
        }

        .score-chip .score-chip-label {
            color: #64748b;
            font-weight: 500;
        }

        .score-chip.primary .score-chip-label {
            color: var(--primary-color);
            opacity: 0.9;
        }

        .score-chip.valid {
            border-color: rgba(80, 200, 120, 0.4);
            background: rgba(80, 200, 120, 0.08);
            color: var(--secondary-color);
        }

        .score-chip.invalid {
            border-color: rgba(231, 76, 60, 0.35);
            background: rgba(231, 76, 60, 0.08);
            color: var(--danger-color);
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #7f8c8d;
        }

        .error {
            background: #fee;
            border: 2px solid var(--danger-color);
            color: var(--danger-color);
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }

        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }

        ::-webkit-scrollbar-thumb {
            background: #bdc3c7;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #95a5a6;
        }

        .type-option {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 8px 14px;
            border-radius: 8px;
            border: 2px solid var(--border-color);
            background: var(--card-bg);
            font-weight: 500;
            transition: all 0.2s;
        }
        .type-option:hover {
            border-color: var(--primary-color);
            background: #f0f8ff;
        }
        .type-option input {
            margin: 0;
        }
        .type-option input:checked + span {
            color: var(--primary-color);
        }

        .file-input-container {
            margin-bottom: 20px;
        }

        .file-input {
            padding: 10px;
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            background: var(--card-bg);
            width: 100%;
            cursor: pointer;
            transition: all 0.3s;
        }

        .file-input:hover {
            border-color: var(--primary-color);
            background: #f0f8ff;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--secondary-color);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: var(--shadow-hover);
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 1200px) {
            .diff-container,
            .diff-container.three-panels {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>📊 Data visualization</h1>
                <div class="type-selector card" style="margin-bottom: 16px; padding: 16px;">
                    <div class="metadata-label" style="margin-bottom: 8px;">CSV type</div>
                    <div style="display: flex; flex-wrap: wrap; gap: 12px; align-items: center;">
                        <label class="type-option">
                            <input type="radio" name="csvType" value="initial_dataset" checked>
                            <span>Initial dataset</span>
                        </label>
                        <label class="type-option">
                            <input type="radio" name="csvType" value="model_predictions">
                            <span>Model predictions</span>
                        </label>
                        <label class="type-option">
                            <input type="radio" name="csvType" value="gradings">
                            <span>Gradings</span>
                        </label>
                        <label class="type-option">
                            <input type="radio" name="csvType" value="comparisons">
                            <span>Comparisons</span>
                        </label>
                        <label class="type-option">
                            <input type="radio" name="csvType" value="auto">
                            <span>Auto-detect</span>
                        </label>
                    </div>
                </div>
                <div class="file-input-container">
                    <input type="file" id="fileInput" accept=".csv" class="file-input">
                </div>
                <div class="history-view-option" style="display: flex; align-items: center; gap: 8px;">
                    <label for="historyViewSelect" style="font-size: 14px; color: var(--text-color);">History:</label>
                    <select id="historyViewSelect" class="file-input" style="width: auto; padding: 6px 10px;">
                        <option value="all">All edits</option>
                        <option value="last5">Last 5 edits</option>
                    </select>
                </div>
                <div class="filter-options" style="display: flex; flex-wrap: wrap; align-items: center; gap: 12px;">
                    <div class="language-filter" style="display: flex; align-items: center; gap: 6px;">
                        <label style="font-size: 14px; color: var(--text-color);">Language:</label>
                        <div id="languageFilterList" style="display: flex; flex-wrap: wrap; gap: 6px;"></div>
                        <span style="font-size: 12px; color: #7f8c8d;">(none = all)</span>
                    </div>
                    <div class="score-filter comparisons-only" id="scoreFilterWrap" style="display: none; align-items: center; gap: 6px;">
                        <label for="scoreFilterSelect" style="font-size: 14px; color: var(--text-color);">Comparison score:</label>
                        <select id="scoreFilterSelect" class="file-input" style="width: auto; padding: 6px 10px;">
                            <option value="all">All</option>
                            <option value="model1">Model 1 wins</option>
                            <option value="tie">Tie</option>
                            <option value="model2">Model 2 wins</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="navigation">
                <button class="btn" id="prevBtn" onclick="navigate(-1)" disabled>← Previous</button>
                <span class="item-counter" id="counter">0 / 0</span>
                <button class="btn" id="nextBtn" onclick="navigate(1)" disabled>Next →</button>
            </div>
        </div>

        <div class="loading" id="loading">Please select a CSV file to begin viewing</div>

        <div id="samplesList" style="display: none;"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/diff/dist/diff.min.js"></script>
    <script>
        let data = [];
        let currentIndex = 0;
        let headers = [];
        let renderedCount = 0;
        let historyViewMode = 'all';
        let filteredIndices = [];
        let selectedLanguages = [];
        let selectedScoreFilter = 'all';
        const BATCH_SIZE = 80;
        const INITIAL_BATCH = 80;

        // Column mapping per CSV type (logical name -> actual column name)
        const CSV_TYPE_CONFIG = {
            comparisons: {
                input: 'input',
                history: 'history',
                ground_truth: 'ground_truth',
                output: 'output_1',
                output2: 'output_2',
                model_name_1: 'model_name_1',
                model_name_2: 'model_name_2',
                score: 'score',
                analysis: 'analysis'
            },
            gradings: {
                input: 'model_input',
                output: 'model_output',
                ground_truth: 'ground_truth',
                score: 'judge_score',
                analysis: 'judge_reasoning',
                output2: null
            },
            model_predictions: {
                input: 'input__input',
                history: 'input__history',
                ground_truth: 'input__ground_truth',
                output: 'output',
                output2: null,
                score: null,
                analysis: null
            },
            initial_dataset: {
                input: 'input',
                history: 'history',
                ground_truth: null,
                output: 'output',
                output2: null,
                score: null,
                analysis: null
            }
        };

        function getSelectedCsvType() {
            return document.querySelector('input[name="csvType"]:checked').value;
        }

        function detectCsvType() {
            if (!headers || headers.length === 0) return 'comparisons';
            const h = headers.map(x => (x || '').trim().toLowerCase());
            if (h.includes('output_1') && h.includes('output_2')) return 'comparisons';
            if (h.includes('judge_score') && h.includes('model_output')) return 'gradings';
            if (h.includes('input__input') && h.includes('output')) return 'model_predictions';
            if (h.includes('input') && h.includes('history') && (h.includes('output') || h.includes('ground_truth'))) return 'initial_dataset';
            return 'comparisons';
        }

        function getNormalizedItem(item) {
            const rawType = getSelectedCsvType();
            const type = rawType === 'auto' ? detectCsvType() : rawType;
            const config = CSV_TYPE_CONFIG[type] || CSV_TYPE_CONFIG.comparisons;
            const normalized = { ...item };
            if (config.input) normalized.input = item[config.input] ?? item.input ?? '';
            if (config.history) normalized.history = item[config.history] ?? item.history ?? '';
            if (config.ground_truth !== undefined) normalized.ground_truth = item[config.ground_truth] ?? item.ground_truth ?? '';
            if (config.output) normalized.output = item[config.output] ?? item.output ?? '';
            if (type === 'initial_dataset') normalized.output = (item.output || item.ground_truth || normalized.output || '').trim() || normalized.output;
            if (config.output2) normalized.output_2 = item[config.output2] ?? item.output_2 ?? '';
            if (config.model_name_1) normalized.model_name_1 = item[config.model_name_1] ?? item.model_name_1 ?? '';
            if (config.model_name_2) normalized.model_name_2 = item[config.model_name_2] ?? item.model_name_2 ?? '';
            if (config.score) normalized.score = item[config.score] ?? item.score ?? '';
            if (config.analysis) normalized.analysis = item[config.analysis] ?? item.analysis ?? '';
            if (type === 'gradings') {
                normalized.judge_score = item.judge_score ?? '';
                normalized.judge_reasoning = item.judge_reasoning ?? '';
            }
            return normalized;
        }

        // File input handler
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                // Show loading message
                const loading = document.getElementById('loading');
                loading.innerHTML = '<div style="text-align: center; padding: 40px;"><div style="font-size: 24px; margin-bottom: 10px;">📂</div><div style="font-size: 18px; color: #7f8c8d;">Loading CSV file...</div><div style="font-size: 14px; color: #95a5a6; margin-top: 10px;">Please wait, parsing ' + file.name + '</div></div>';
                loading.style.display = 'block';
                
                const reader = new FileReader();
                reader.onload = function(event) {
                    try {
                        // Use setTimeout to allow UI to update
                        setTimeout(() => {
                            try {
                                parseCSV(event.target.result);
                                
                                document.getElementById('loading').style.display = 'none';
                                filteredIndices = computeFilteredIndices();
                                buildLanguageFilterUI();
                                var t = getSelectedCsvType() === 'auto' ? detectCsvType() : getSelectedCsvType();
                                document.getElementById('scoreFilterWrap').style.display = t === 'comparisons' ? 'flex' : 'none';
                                const list = document.getElementById('samplesList');
                                list.innerHTML = '';
                                list.style.display = 'block';
                                renderedCount = 0;
                                currentIndex = 0;
                                renderBatch(0, Math.min(INITIAL_BATCH, filteredIndices.length));
                                updateCounterAndButtons();
                                window.removeEventListener('scroll', loadMoreOnScroll);
                                if (renderedCount < filteredIndices.length) {
                                    window.addEventListener('scroll', loadMoreOnScroll, { passive: true });
                                }
                                updateScrollCounterObserver();
                                let msg = 'File loaded successfully! ' + data.length + ' items found.';
                                if (getSelectedCsvType() === 'auto') {
                                    msg += ' Detected type: ' + detectCsvType() + '.';
                                }
                                showToast(msg);
                            } catch (error) {
                                console.error('CSV parsing error:', error);
                                showError('Error parsing CSV file: ' + error.message);
                            }
                        }, 100);
                    } catch (error) {
                        console.error('Error:', error);
                        showError('Error loading CSV file: ' + error.message);
                    }
                };
                reader.onerror = function() {
                    showError('Error reading file. Please try again.');
                };
                
                reader.readAsText(file);
            }
        });

        function resetCollapsiblesToInitial() {
            var ids = ['analysisContent', 'historyContent', 'inputOutputContent', 'inputOutput2Content', 'inputGroundTruthContent'];
            var addCollapsed = [false, true, true, true, true];
            ids.forEach(function(id, i) {
                var el = document.getElementById(id);
                if (el) { if (addCollapsed[i]) el.classList.add('collapsed'); else el.classList.remove('collapsed'); }
            });
        }

        // When user changes CSV type: clear file, reset data, reset collapsibles, reset language/score filters
        document.querySelectorAll('input[name="csvType"]').forEach(function(radio) {
            radio.addEventListener('change', function() {
                document.getElementById('fileInput').value = '';
                data = [];
                headers = [];
                currentIndex = 0;
                filteredIndices = [];
                selectedLanguages = [];
                selectedScoreFilter = 'all';
                document.getElementById('scoreFilterSelect').value = 'all';
                document.getElementById('languageFilterList').innerHTML = '';
                document.getElementById('samplesList').style.display = 'none';
                document.getElementById('samplesList').innerHTML = '';
                renderedCount = 0;
                window.removeEventListener('scroll', loadMoreOnScroll);

        function parseCSV(csvText) {
            if (!csvText || !csvText.trim()) {
                throw new Error('CSV file is empty');
            }

            const rows = [];
            let currentRow = [];
            let currentField = '';
            let inQuotes = false;
            
            for (let i = 0; i < csvText.length; i++) {
                const char = csvText[i];
                const nextChar = csvText[i + 1];
                
                if (char === '"') {
                    if (inQuotes && nextChar === '"') {
                        // Escaped quote
                        currentField += '"';
                        i++;
                    } else {
                        // Toggle quote mode
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    // End of field
                    currentRow.push(currentField);
                    currentField = '';
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    // End of row
                    if (char === '\r' && nextChar === '\n') {
                        i++; // Skip \r\n combo
                    }
                    currentRow.push(currentField);
                    if (currentRow.some(field => field.trim() !== '')) {
                        rows.push(currentRow);
                    }
                    currentRow = [];
                    currentField = '';
                } else {
                    currentField += char;
                }
            }
            
            // Handle last field and row
            if (currentField || currentRow.length > 0) {
                currentRow.push(currentField);
                if (currentRow.some(field => field.trim() !== '')) {
                    rows.push(currentRow);
                }
            }
            
            if (rows.length === 0) {
                throw new Error('No data found in CSV file');
            }

            // First row is headers
            headers = rows[0];
            console.log('CSV Headers:', headers);
            console.log('Total rows (including header):', rows.length);
            
            // Convert remaining rows to objects
            data = [];
            for (let i = 1; i < rows.length; i++) {
                const row = {};
                headers.forEach((header, index) => {
                    row[header] = rows[i][index] || '';
                });
                data.push(row);
            }
            
            console.log('Parsed data rows:', data.length);
            console.log('First row sample:', data[0]);
            
            currentIndex = 0;
        }

        function navigate(direction) {
            const total = filteredIndices.length;
            if (total === 0) return;
            const newIndex = currentIndex + direction;
            if (newIndex < 0 || newIndex >= total) return;
            currentIndex = newIndex;
            while (renderedCount <= currentIndex && renderedCount < total) renderBatch(renderedCount, BATCH_SIZE);
            updateCounterAndButtons();
            const sec = document.getElementById('sample-' + currentIndex);
            if (sec) sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function formatMetricOrStatLabel(key, metricsPrefix, statsPrefix) {
            let name = key;
            if (name.startsWith(metricsPrefix)) name = name.slice(metricsPrefix.length);
            else if (name.startsWith(statsPrefix)) name = name.slice(statsPrefix.length);
            name = name.replace(/^Statistic\.|^Metrics\./i, '').replace(/_/g, ' ').replace(/\./g, ' ');
            return name.replace(/\b\w/g, l => l.toUpperCase()).trim();
        }

        function displayGradingsMetricsAndStatistics(item) {
            const type = getSelectedCsvType() === 'auto' ? detectCsvType() : getSelectedCsvType();
            if (type !== 'gradings') {
                document.getElementById('metricsCard').style.display = 'none';
                document.getElementById('statisticsCard').style.display = 'none';
                return;
            }
            const metricsPrefix = 'ground_truth_metrics__';
            const statsPrefix = 'stats__';
            const allMetricKeys = Object.keys(item).filter(k => k.startsWith(metricsPrefix));
            const allStatKeys = Object.keys(item).filter(k => k.startsWith(statsPrefix));
            const mainMetricKeys = allMetricKeys.filter(k => !/FIRST_HUNK/i.test(k));
            const firstHunkMetricKeys = allMetricKeys.filter(k => /FIRST_HUNK/i.test(k));
            const goldenStatKeys = allStatKeys.filter(k => /GOLDEN/i.test(k));
            const predictionStatKeys = allStatKeys.filter(k => /PREDICTION/i.test(k));

            function renderMetricOrStatTable(keys, item, metricsPrefix, statsPrefix) {
                if (keys.length === 0) return '';
                let rows = '';
                keys.forEach(key => {
                    const value = item[key];
                    const displayValue = (value !== undefined && value !== null && String(value).trim() !== '')
                        ? escapeHtml(String(value)) : '—';
                    const label = formatMetricOrStatLabel(key, metricsPrefix, statsPrefix);
                    rows += `<tr><th>${escapeHtml(label)}</th><td>${displayValue}</td></tr>`;
                });
                return '<table class="metrics-stat-table"><tbody>' + rows + '</tbody></table>';
            }

            if (allMetricKeys.length > 0) {
                document.getElementById('metricsCard').style.display = 'block';
                let html = '';
                if (mainMetricKeys.length > 0) {
                    html += '<div class="metrics-stat-table-wrapper">' + renderMetricOrStatTable(mainMetricKeys, item, metricsPrefix, statsPrefix) + '</div>';
                }
                if (firstHunkMetricKeys.length > 0) {
                    html += '<div class="metrics-stat-table-wrapper">' + renderMetricOrStatTable(firstHunkMetricKeys, item, metricsPrefix, statsPrefix) + '</div>';
                }
                document.getElementById('metricsInfo').innerHTML = html;
            } else {
                document.getElementById('metricsCard').style.display = 'none';
            }

            if (allStatKeys.length > 0) {
                document.getElementById('statisticsCard').style.display = 'block';

                if (goldenStatKeys.length > 0) {
                    html += '<div class="metrics-stat-table-wrapper">' + renderMetricOrStatTable(goldenStatKeys, item, metricsPrefix, statsPrefix) + '</div>';
                }
                if (predictionStatKeys.length > 0) {
                    html += '<div class="metrics-stat-table-wrapper">' + renderMetricOrStatTable(predictionStatKeys, item, metricsPrefix, statsPrefix) + '</div>';
                }

            }

            const model2 = (item.model_name_2 || '').trim() || 'Model 2';
            if (raw === '' || Number.isNaN(rawScore)) return null;
            if (rawScore <= 0.25) return escapeHtml(model1);
            if (rawScore >= 0.75) return escapeHtml(model2);
            if (Math.abs(rawScore - 0.5) < 0.25) return 'Tie';
            return null;

        function displayEvents(eventsText) {
            const element = document.getElementById('historyDisplay');
            
            // Parse all edits
            const editRegex = /User edited "([^"]+)":\s*```diff\n([\s\S]*?)```/g;
            const allEdits = [];
            let match;
            
            while ((match = editRegex.exec(eventsText)) !== null) {
                allEdits.push({
                    fileName: match[1],
                    diff: match[2]
                });
            }
            
            if (allEdits.length === 0) {
                element.innerHTML = '<div style="color: #9ca3af; padding: 20px; text-align: center;">No edit history available</div>';
                return;
            }
            
            let html = '';
            allEdits.forEach((edit, index) => {
                const editId = `edit-${currentIndex}-${index}`;
                const fileName = edit.fileName.split('/').pop() || edit.fileName;
                const fullPath = edit.fileName;
                
                html += `<div class="edit-item">`;
                html += `<div class="edit-header" onclick="toggleEdit('${editId}')">`;
                html += `<div class="edit-title">`;
                html += `<span class="edit-number">#${index + 1}</span>`;
                html += `<span>📄 ${escapeHtml(fileName)}</span>`;
                html += `</div>`;
                html += `<span class="edit-toggle" id="${editId}-toggle">▼</span>`;
                html += `</div>`;
                html += `<div class="edit-content" id="${editId}">`;
                html += `<div class="edit-body">`;
                html += `<div class="edit-file">📁 ${escapeHtml(fullPath)}</div>`;
                html += formatDiffBlock(edit.diff);
                html += `</div>`;
                html += `</div>`;
                html += `</div>`;
            });
            
            element.innerHTML = html;
        }

        function formatDiffBlock(diffText) {
            const lines = diffText.split('\n');
            
            let html = '<div style="font-family: \'Consolas\', \'Monaco\', monospace; font-size: 13px; line-height: 1.6; border: 1px solid #3d3d3d; border-radius: 6px; overflow: hidden;">';
            
            for (const line of lines) {
                if (line.startsWith('+') && !line.startsWith('+++')) {
                    const content = escapeHtml(line.substring(1));
                    html += `<div style="background: #1a3d1a; color: #7fdd7f; padding: 2px 12px; border-left: 3px solid #4ade80;"><span style="opacity: 0.5; margin-right: 8px;">+</span>${content}</div>`;
                } else if (line.startsWith('-') && !line.startsWith('---')) {
                    const content = escapeHtml(line.substring(1));
                    html += `<div style="background: #3d1a1a; color: #dd7f7f; padding: 2px 12px; border-left: 3px solid #f87171;"><span style="opacity: 0.5; margin-right: 8px;">-</span>${content}</div>`;
                } else if (line.startsWith('@@')) {
                    html += `<div style="background: #1a2a3d; color: #7fbfdd; padding: 4px 12px; font-weight: 600; border-left: 3px solid #60a5fa;">${escapeHtml(line)}</div>`;
                } else if (line.trim()) {
                    const content = escapeHtml(line);
                    html += `<div style="background: #1e1e1e; color: #d4d4d4; padding: 2px 12px;"><span style="opacity: 0.3; margin-right: 8px;">·</span>${content}</div>`;
                } else {
                    html += `<div style="background: #1e1e1e; color: #6b7280; padding: 2px 12px;"><span style="opacity: 0.3; margin-right: 8px;">·</span><span style="opacity: 0.3;">(empty line)</span></div>`;
                }
            }
            
            html += '</div>';
            return html;
        }

        function extractCode(text) {
            if (!text) return '';
            
            // Extract code from markdown code blocks with language
            const codeBlockMatch = text.match(/```[^\n]*\n([\s\S]*?)```/);
            if (codeBlockMatch) {
                return codeBlockMatch[1];
            }
            
            // Try without language specifier
            const simpleBlockMatch = text.match(/```([\s\S]*?)```/);
            if (simpleBlockMatch) {
                return simpleBlockMatch[1];
            }
            
            // If no code block markers, return as-is
            return text;
        }

        function extractCodeForDiff(text) {
            let code = extractCode(text);
            
            // Remove cursor marker and editable region markers
            code = code.replace(/<\|user_cursor_is_here\|>/g, '');
            code = code.replace(/<\|editable_region_start\|>/g, '');
            code = code.replace(/<\|editable_region_end\|>/g, '');
            
            return code;
        }

        function displayCode(elementId, code) {
            const element = document.getElementById(elementId);
            element.innerHTML = '';
            
            const pre = document.createElement('pre');
            pre.style.margin = '0';
            const codeElement = document.createElement('code');
            codeElement.className = 'language-python';
            codeElement.textContent = code;
            pre.appendChild(codeElement);
            element.appendChild(pre);
            
            if (window.Prism) {
                Prism.highlightElement(codeElement);
            }
        }

        function generateDiffs(item, rawItem) {
            const raw = rawItem || item;
            const rawType = getSelectedCsvType();
            const type = rawType === 'auto' ? detectCsvType() : rawType;

            }

                        item.model_name_2 ? `Input → ${item.model_name_2}` : 'Input → Output 2';
                    document.getElementById('diffInputOutput').innerHTML = createUnifiedDiff(input, output1, 'input', 'output_1');
                    document.getElementById('diffInputGT').innerHTML = createUnifiedDiff(input, output2, 'input', 'output_2');

                    document.querySelector('#diffsCard .diff-container .diff-panel:nth-child(2) .diff-header').textContent = 'Input → Ground Truth';
                    if (output1) document.getElementById('diffInputOutput').innerHTML = createUnifiedDiff(input, output1, 'input', 'output');

        function createUnifiedDiff(oldStr, newStr, oldName, newName) {
            if (!window.Diff) {
                return '<div class="code-block">Diff library not loaded</div>';
            }

            const diff = Diff.createPatch('file', oldStr, newStr, oldName, newName);
            
            const lines = diff.split('\n');
            let html = '<div class="code-block" style="white-space: pre-wrap; padding: 0; border-radius: 8px;">';
            
            for (const line of lines) {
                if (line.startsWith('+') && !line.startsWith('+++')) {
                    const content = escapeHtml(line);
                    html += `<div style="background: #1a3d1a; color: #7fdd7f; padding: 2px 20px; border-left: 3px solid #4ade80;">${content}</div>`;
                } else if (line.startsWith('-') && !line.startsWith('---')) {
                    const content = escapeHtml(line);
                    html += `<div style="background: #3d1a1a; color: #dd7f7f; padding: 2px 20px; border-left: 3px solid #f87171;">${content}</div>`;
                } else if (line.startsWith('@@')) {
                    html += `<div style="background: #1a2a3d; color: #7fbfdd; padding: 4px 20px; font-weight: 600; border-left: 3px solid #60a5fa;">${escapeHtml(line)}</div>`;
                } else if (line.startsWith('---') || line.startsWith('+++')) {
                    html += `<div style="color: #9ca3af; padding: 2px 20px; font-style: italic;">${escapeHtml(line)}</div>`;
                } else if (line.trim()) {
                    const content = escapeHtml(line);
                    html += `<div style="color: #d4d4d4; padding: 2px 20px;">${content}</div>`;
                } else {
                    html += `<div style="color: #6b7280; padding: 2px 20px;"><span style="opacity: 0.3;">(empty line)</span></div>`;
                }
            }
            
            html += '</div>';
            return html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function codeBlockHtml(code) {
            return '<div class="code-block"><pre><code>' + escapeHtml(code || '') + '</code></pre></div>';
        }

        function getLanguageFromRow(dataIndex) {
            const item = getNormalizedItem(data[dataIndex] || {});
            const t = getSelectedCsvType() === 'auto' ? detectCsvType() : getSelectedCsvType();
            if (t === 'comparisons') return (item.meta__language_1 != null && item.meta__language_1 !== '') ? String(item.meta__language_1).trim() : '';
            if (t === 'initial_dataset') return (item.language != null && item.language !== '') ? String(item.language).trim() : '';
            return (item.meta__language != null && item.meta__language !== '') ? String(item.meta__language).trim() : '';
        }

        function getComparisonScore(dataIndex) {
            const item = getNormalizedItem(data[dataIndex] || {});
            const raw = String(item.score ?? item.comparison_score ?? '').trim();
            return parseFloat(raw, 10);
        }

        function getUniqueLanguages() {
            const set = {};
            for (let idx = 0; idx < data.length; idx++) {
                const lang = getLanguageFromRow(idx);
                if (lang) set[lang] = true;
            }
            return Object.keys(set).sort();
        }

        function computeFilteredIndices() {
            const t = getSelectedCsvType() === 'auto' ? detectCsvType() : getSelectedCsvType();
            const indices = [];
            for (let i = 0; i < data.length; i++) {
                if (selectedLanguages.length > 0) {
                    const lang = getLanguageFromRow(i);
                    if (selectedLanguages.indexOf(lang) === -1) continue;
                }
                if (t === 'comparisons' && selectedScoreFilter !== 'all') {
                    const score = getComparisonScore(i);
                    if (Number.isNaN(score)) continue;
                    if (selectedScoreFilter === 'model1' && score > 0.25) continue;
                    if (selectedScoreFilter === 'model2' && score < 0.75) continue;
                    if (selectedScoreFilter === 'tie' && (score <= 0.25 || score >= 0.75)) continue;
                }
                indices.push(i);
            }
            return indices;
        }

        }

        function renderBatch(fromIndex, count) {
            const list = document.getElementById('samplesList');
            if (!list) return;
            const total = filteredIndices.length;
            const to = Math.min(fromIndex + count, total);
            let html = '';
            for (let j = fromIndex; j < to; j++) {
                const dataIdx = filteredIndices[j];
                html += '<section class="sample-block" id="sample-' + j + '" data-index="' + j + '">' + getSampleBlockHtmlContent(dataIdx, j) + '</section>';
            }
            list.insertAdjacentHTML('beforeend', html);
            renderedCount = to;
            updateScrollCounterObserver();
        }

        function updateCounterAndButtons() {
            const total = filteredIndices.length;
            document.getElementById('counter').textContent = (currentIndex + 1) + ' / ' + total;
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex >= total - 1;
        }

        function loadMoreOnScroll() {
            if (renderedCount >= filteredIndices.length) {
                window.removeEventListener('scroll', loadMoreOnScroll);
                return;
            }
            const doc = document.documentElement;
            const nearBottom = (window.pageYOffset || doc.scrollTop) + doc.clientHeight >= doc.scrollHeight - 400;
            if (nearBottom) renderBatch(renderedCount, BATCH_SIZE);
            if (renderedCount >= filteredIndices.length) window.removeEventListener('scroll', loadMoreOnScroll);
        }

        function toggleCollapse(id) {
            const element = document.getElementById(id);
            element.classList.toggle('collapsed');
        }

        function toggleEdit(editId) {
            const content = document.getElementById(editId);
            const toggle = document.getElementById(editId + '-toggle');
            
            content.classList.toggle('expanded');
            toggle.classList.toggle('expanded');
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        function showError(message) {
            const loading = document.getElementById('loading');
            loading.innerHTML = `<div class="error">❌ ${message}</div>`;
            loading.style.display = 'block';
        }

        var scrollCounterObserver = null;
        function updateScrollCounterObserver() {
            if (scrollCounterObserver) scrollCounterObserver.disconnect();
            var list = document.getElementById('samplesList');
            if (!list || list.children.length === 0) return;
            scrollCounterObserver = new IntersectionObserver(function(entries) {
                entries.forEach(function(e) {
                    if (e.isIntersecting) {
                        var idx = parseInt(e.target.getAttribute('data-index'), 10);
                        if (!isNaN(idx) && idx !== currentIndex) {
                            currentIndex = idx;
                            updateCounterAndButtons();
                        }
                    }
                });
            }, { root: null, rootMargin: '-30% 0px -30% 0px', threshold: 0 });
            for (var i = 0; i < list.children.length; i++) scrollCounterObserver.observe(list.children[i]);
        }

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft') {
                navigate(-1);
            } else if (e.key === 'ArrowRight') {
                navigate(1);
            }
        });

    </script>
</body>
</html>
